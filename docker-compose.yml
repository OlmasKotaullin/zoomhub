services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zoomhub
      POSTGRES_USER: zoomhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoomhub"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://zoomhub:${POSTGRES_PASSWORD:-changeme}@db:5432/zoomhub
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-claude}
      TRANSCRIPTION_PROVIDER: ${TRANSCRIPTION_PROVIDER:-openai_whisper}
      DOCKER_MODE: "1"
    volumes:
      - recordings:/app/data/recordings
      - logs:/app/data/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  recordings:
  logs:
