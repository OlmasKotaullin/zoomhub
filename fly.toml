# fly.toml app configuration file generated for zoomhub-app on 2026-03-23T11:58:47+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'zoomhub-app'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
