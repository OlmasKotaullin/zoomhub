name: Build Whisper Worker

on:
  workflow_dispatch:  # Manual trigger only
  push:
    paths:
      - 'runpod-worker/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./runpod-worker
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/zoomhub-whisper:latest
            ghcr.io/${{ steps.owner.outputs.name }}/zoomhub-whisper:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
