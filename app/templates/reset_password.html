<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый пароль — ZoomHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { zoom: { DEFAULT: '#0b5cff', hover: '#0047d4', light: '#e8f0fe' }, g: { 50: '#f7f9fc', 100: '#eef1f6', 200: '#dde3ed', 500: '#6b7a94', 700: '#374151', 800: '#232b3a', 900: '#131820' } },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }}
    }
  </script>
  <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="bg-g-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-zoom rounded-2xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      </div>
      <h1 class="text-2xl font-extrabold text-g-900">Новый пароль</h1>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-8">
      {% if error %}
      <div class="bg-red-50 text-red-700 px-4 py-3 rounded-xl text-sm mb-4">{{ error }}</div>
      {% endif %}

      {% if valid %}
      <form method="POST" action="/reset-password" class="space-y-4">
        <input type="hidden" name="token" value="{{ token }}">
        <div>
          <label class="block text-sm font-medium text-g-700 mb-1.5">Новый пароль</label>
          <input type="password" name="password" required minlength="6"
                 class="w-full px-4 py-2.5 border border-g-200 rounded-xl text-sm focus:ring-2 focus:ring-zoom focus:border-zoom outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-g-700 mb-1.5">Повторите пароль</label>
          <input type="password" name="password_confirm" required minlength="6"
                 class="w-full px-4 py-2.5 border border-g-200 rounded-xl text-sm focus:ring-2 focus:ring-zoom focus:border-zoom outline-none transition">
        </div>
        <button type="submit"
                class="w-full bg-zoom hover:bg-zoom-hover text-white font-semibold py-2.5 px-4 rounded-xl transition">
          Сохранить пароль
        </button>
      </form>
      {% else %}
      <p class="text-center text-g-500 text-sm">Запросите новую ссылку для сброса пароля.</p>
      {% endif %}
    </div>

    <p class="text-center text-sm text-g-500 mt-6">
      <a href="/login" class="text-zoom hover:underline font-medium">Назад ко входу</a>
    </p>
  </div>
</body>
</html>
