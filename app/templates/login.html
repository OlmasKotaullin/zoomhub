<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — ZoomHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { zoom: { DEFAULT: '#0b5cff', hover: '#0047d4', light: '#e8f0fe' }, g: { 50: '#f7f9fc', 100: '#eef1f6', 800: '#232b3a', 900: '#131820' } },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }}
    }
  </script>
  <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="bg-g-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-zoom rounded-2xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
      </div>
      <h1 class="text-2xl font-extrabold text-g-900">ZoomHub</h1>
      <p class="text-g-500 mt-1">AI-обработка встреч</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-8">
      <h2 class="text-lg font-bold text-g-900 mb-6">Вход в аккаунт</h2>

      {% if error %}
      <div class="bg-red-50 text-red-700 px-4 py-3 rounded-xl text-sm mb-4">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-g-700 mb-1.5">Email</label>
          <input type="email" name="email" required autocomplete="email"
                 class="w-full px-4 py-2.5 border border-g-200 rounded-xl text-sm focus:ring-2 focus:ring-zoom focus:border-zoom outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-g-700 mb-1.5">Пароль</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="w-full px-4 py-2.5 border border-g-200 rounded-xl text-sm focus:ring-2 focus:ring-zoom focus:border-zoom outline-none transition">
        </div>
        <button type="submit"
                class="w-full bg-zoom hover:bg-zoom-hover text-white font-semibold py-2.5 px-4 rounded-xl transition">
          Войти
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-g-500 mt-6">
      Нет аккаунта? <a href="/register" class="text-zoom hover:underline font-medium">Зарегистрироваться</a>
    </p>
  </div>
</body>
</html>
